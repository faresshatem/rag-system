version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentic_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # Core Database with Search & JSON modules (Required by LangGraph)
  redis:
    image: redis/redis-stack-server:latest
    container_name: agentic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Standalone UI
  redisinsight:
    image: redis/redisinsight:latest
    container_name: agentic_redisinsight
    ports:
      - "5540:5540"
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  qdrant_storage:
  redis_data: