
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentic_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # Core Database with Search & JSON modules (Required by LangGraph)
  redis:
    image: redis/redis-stack-server:latest
    container_name: agentic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Standalone UI
  redisinsight:
    image: redis/redisinsight:latest
    container_name: agentic_redisinsight
    ports:
      - " :5540"
    restart: unless-stopped
    depends_on:
      - redis

  # Structured Data & RBAC Database
  postgres:
    image: postgres:16-alpine
    container_name: rag_structured_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/database/init-scripts:/docker-entrypoint-initdb.d

volumes:
  qdrant_storage:
  redis_data:
  pgdata: